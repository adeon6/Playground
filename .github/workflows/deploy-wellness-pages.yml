name: Deploy Playground Pages

on:
  push:
    branches:
      - main
    paths:
      - "wellness/**"
      - "reply-lab/**"
      - "pages/**"
      - ".github/workflows/deploy-wellness-pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Build static Pages bundle
        run: |
          mkdir public
          cp -R pages/. public/
          mkdir -p public/wellness public/reply-lab
          cp -R wellness/. public/wellness/
          cp -R reply-lab/. public/reply-lab/

      - name: Upload Playground site
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./public

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
